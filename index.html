<!doctype html>
<html lang="ru">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>2 Sided OLL Recognition</title>
        <link rel="stylesheet" href="style.css" />
        <script
            type="module"
            src="https://cdn.cubing.net/v0/js/cubing/twisty"
        ></script>
    </head>
    <body>
        <aside id="sidebar" class="sidebar">
            <div class="sidebar-header">
                <h1 class="sidebar-title">Trainer</h1>
                <div class="theme-toggle" id="theme-toggle">
                    <button
                        type="button"
                        class="theme-btn"
                        data-theme="light"
                        title="Light theme"
                    >
                        ☀️
                    </button>
                    <button
                        type="button"
                        class="theme-btn"
                        data-theme="dark"
                        title="Dark theme"
                    >
                        🌙
                    </button>
                    <button
                        type="button"
                        class="theme-btn active"
                        data-theme="system"
                        title="System theme"
                    >
                        💻
                    </button>
                </div>
            </div>

            <section class="setting-block">
                <h3>Recognition mode</h3>
                <div class="mode-switch" id="mode-switch">
                    <button
                        type="button"
                        class="mode-btn active"
                        data-mode="oll"
                    >
                        OLL
                    </button>
                    <button type="button" class="mode-btn" data-mode="pll">
                        PLL
                    </button>
                </div>
            </section>

            <label class="setting-row">
                <input type="checkbox" id="show-timer" checked />
                <span>Show timer</span>
            </label>

            <section class="setting-block">
                <h3>Cross color</h3>
                <p class="hint">Select one or more — random on each scramble</p>
                <div class="cross-colors" id="cross-colors">
                    <button
                        type="button"
                        class="color-btn active"
                        data-setup="x2"
                        data-color="white"
                        title="White cross → yellow top"
                        style="--swatch: #ffffff"
                    ></button>
                    <button
                        type="button"
                        class="color-btn active"
                        data-setup=""
                        data-color="yellow"
                        title="Yellow cross → white top"
                        style="--swatch: #facc15"
                    ></button>
                    <button
                        type="button"
                        class="color-btn"
                        data-setup="x'"
                        data-color="blue"
                        title="Blue cross → green top"
                        style="--swatch: #3b82f6"
                    ></button>
                    <button
                        type="button"
                        class="color-btn"
                        data-setup="x"
                        data-color="green"
                        title="Green cross → blue top"
                        style="--swatch: #22c55e"
                    ></button>
                    <button
                        type="button"
                        class="color-btn"
                        data-setup="z"
                        data-color="red"
                        title="Red cross → orange top"
                        style="--swatch: #ef4444"
                    ></button>
                    <button
                        type="button"
                        class="color-btn"
                        data-setup="z'"
                        data-color="orange"
                        title="Orange cross → red top"
                        style="--swatch: #f97316"
                    ></button>
                </div>
            </section>

            <section class="setting-block" id="train-mode-block">
                <h3>Training mode</h3>
                <div id="train-mode-tabs" class="train-tabs">
                    <!-- Заполняется динамически -->
                </div>
            </section>
        </aside>

        <main class="main">
            <div class="cube-wrap">
                <svg
                    class="cube-backdrop"
                    viewBox="-1.6 -1.7 3.2 3.4"
                    preserveAspectRatio="xMidYMid meet"
                    xmlns="http://www.w3.org/2000/svg"
                >
                    <polygon
                        id="cube-body-silhouette"
                        class="cube-body"
                        points="0.365,1.46 1.085,0.59 1.27,-1.08 -0.4,-1.41 -1.4,-0.89 -1.38,0.91"
                    />
                </svg>
                <twisty-player
                    id="cube-player"
                    puzzle="3x3x3"
                    alg=""
                    experimental-drag-input="none"
                    control-panel="none"
                    background="none"
                    back-view="none"
                    hint-facelets="none"
                    camera-latitude="25"
                    camera-longitude="25"
                    camera-distance="5"
                    pixel-ratio="2"
                >
                </twisty-player>
            </div>

            <div id="timer-display" class="timer">0.00</div>

            <div class="controls-row">
                <button type="button" id="start-btn" class="btn btn-primary">
                    Start
                </button>
                <button
                    type="button"
                    id="stop-btn"
                    class="btn btn-secondary hidden"
                >
                    Stop
                </button>
            </div>

            <div id="select-area" class="select-area">
                <div class="select-controls">
                    <button
                        type="button"
                        id="select-all-btn"
                        class="btn btn-small"
                    >
                        Select all
                    </button>
                    <button
                        type="button"
                        id="select-none-btn"
                        class="btn btn-small"
                    >
                        Select none
                    </button>
                    <span id="select-count" class="select-count"></span>
                </div>
                <div id="select-grid" class="select-grid"></div>
            </div>

            <div id="oll-grid" class="oll-grid" aria-hidden="true"></div>

            <div id="stats-table" class="stats-table hidden">
                <table id="stats-body">
                    <thead>
                        <tr>
                            <th>Algorithm</th>
                            <th>Average</th>
                            <th>Solved</th>
                            <th>Errors</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
        </main>

        <script src="data.js"></script>
        <script src="script.js"></script>
    </body>
</html>
